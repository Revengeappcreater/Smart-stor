<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store - Digital Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .order-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #location-status { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="card order-card p-4">
            <h3 class="fw-bold text-primary">Rushikesh Store 🛍️</h3>
            <p id="location-status">तुमचं लोकेशन शोधत आहे...</p>
            
            <form id="orderForm">
                <div class="mb-3">
                    <label class="form-label">तुमचं नाव</label>
                    <input type="text" id="custName" class="form-control" placeholder="नाव टाका" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">मोबाईल नंबर</label>
                    <input type="tel" id="custPhone" class="form-control" placeholder="नंबर टाका" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">ऑर्डर काय आहे?</label>
                    <textarea id="orderDetails" class="form-control" rows="3" placeholder="उदा. १ शर्ट, २ पॅन्ट"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow">ऑर्डर बुक करा</button>
            </form>
        </div>
    </div>

    <script type="module">
        // इथे आपण Firebase चं लॉजिक टाकूया
    </script>
</body>
</html>
